name: Deploy EduFlow

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_all:
        description: Build frontend dan backend tanpa smart diff
        required: false
        default: "true"
        type: choice
        options:
          - "false"
          - "true"
      run_migration:
        description: Paksa Prisma migrate deploy
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_seed:
        description: Jalankan Prisma seed setelah migration
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: eduflow-production-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  EDUFLOW_DEPLOY_PATH: /srv/eduflow/app
  EDUFLOW_LOG_DIR: /srv/eduflow/logs/deploy

jobs:
  validate:
    name: Validate source
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate, test, and build
        env:
          DATABASE_URL: postgresql://eduflow:eduflow@localhost:5432/eduflow?schema=public
        run: npm run validate

  deploy:
    name: Deploy production
    runs-on: self-hosted
    needs: validate
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Deploy
        env:
          DEPLOY_LOG_DIR: ${{ env.EDUFLOW_LOG_DIR }}
          DEPLOY_BRANCH: main
          DEPLOY_BASE_SHA: ${{ github.event.before }}
          DEPLOY_HEAD_SHA: ${{ github.sha }}
          DEPLOY_BUILD_ALL: ${{ github.event.inputs.build_all == 'true' && '1' || '0' }}
          DEPLOY_RUN_MIGRATION: ${{ github.event.inputs.run_migration == 'true' && '1' || '0' }}
          DEPLOY_RUN_SEED: ${{ github.event.inputs.run_seed == 'true' && '1' || '0' }}
        run: |
          cd "$EDUFLOW_DEPLOY_PATH"
          bash ./scripts/deploy.sh

      - name: Show deploy logs on failure
        if: failure()
        run: |
          set +e
          log_dir="$EDUFLOW_LOG_DIR"
          latest_log="$(ls -t "$log_dir"/*.log 2>/dev/null | head -n 1)"
          if [ -z "$latest_log" ]; then
            echo "Tidak ada log deployment di ${log_dir}."
            exit 0
          fi

          echo "Menampilkan 200 baris terakhir dari ${latest_log}"
          tail -n 200 "$latest_log"
