name: Deploy EduFlow

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_all:
        description: Build frontend dan backend tanpa smart diff
        required: false
        default: "true"
        type: choice
        options:
          - "false"
          - "true"
      run_migration:
        description: Paksa Prisma migrate deploy
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_seed:
        description: Jalankan Prisma seed setelah migration
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: eduflow-production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy production
    runs-on: self-hosted
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Deploy
        env:
          EDUFLOW_DEPLOY_PATH: ${{ vars.EDUFLOW_DEPLOY_PATH || '/srv/eduflow/app' }}
          EDUFLOW_LOG_DIR: ${{ vars.EDUFLOW_LOG_DIR || '/srv/eduflow/logs/deploy' }}
          EDUFLOW_ROOT: ${{ vars.EDUFLOW_DEPLOY_PATH || '/srv/eduflow/app' }}
          DEPLOY_LOG_DIR: ${{ vars.EDUFLOW_LOG_DIR || '/srv/eduflow/logs/deploy' }}
          DEPLOY_BRANCH: main
          DEPLOY_BASE_SHA: ${{ github.event.before }}
          DEPLOY_HEAD_SHA: ${{ github.sha }}
          DEPLOY_BUILD_ALL: ${{ github.event.inputs.build_all == 'true' && '1' || '0' }}
          DEPLOY_RUN_MIGRATION: ${{ github.event.inputs.run_migration == 'true' && '1' || '0' }}
          DEPLOY_RUN_SEED: ${{ github.event.inputs.run_seed == 'true' && '1' || '0' }}
        run: |
          test -d "$EDUFLOW_DEPLOY_PATH"
          bash "$GITHUB_WORKSPACE/scripts/deploy.sh"

      - name: Show deploy logs on failure
        if: failure()
        run: |
          set +e
          log_dir="${{ vars.EDUFLOW_LOG_DIR || '/srv/eduflow/logs/deploy' }}"
          latest_log="$(ls -t "$log_dir"/*.log 2>/dev/null | head -n 1)"
          if [ -z "$latest_log" ]; then
            echo "Tidak ada log deployment di ${log_dir}."
            exit 0
          fi

          echo "Menampilkan 200 baris terakhir dari ${latest_log}"
          tail -n 200 "$latest_log"
